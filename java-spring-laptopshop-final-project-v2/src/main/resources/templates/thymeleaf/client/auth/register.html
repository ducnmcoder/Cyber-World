<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cyber World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cyber-homepage.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
            margin-bottom: 15px;
        }
        .form-row .form-group {
            margin-bottom: 0;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #cb1c22;
        }
        .form-group input.is-invalid {
            border-color: #c62828;
        }
        .invalid-feedback {
            color: #c62828;
            font-size: 13px;
            margin-top: 5px;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #cb1c22;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background: #a81519;
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .auth-links a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <main class="main-container">
        <div class="auth-container">
            <h2>Create an Account</h2>
            
            <form method="post" th:action="@{/register}" th:object="${registerUser}">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" th:field="*{firstName}" placeholder="First Name" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" th:field="*{lastName}" placeholder="Last Name" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" placeholder="name@example.com" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" />
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" placeholder="Create Password" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" />
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" th:field="*{confirmPassword}" placeholder="Confirm Password" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''" />
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>
                
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit" class="btn-submit">Register</button>
            </form>

            <div class="auth-links">
                <p>Already have an account? <a href="/login">Login now</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{client/layout/footer :: footer}"></div>
</body>
</html>
