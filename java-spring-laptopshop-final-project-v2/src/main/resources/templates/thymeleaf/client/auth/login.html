<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cyber World</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cyber-homepage.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f1f2f6;
        }
        .auth-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .auth-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #cd1818;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #cd1818;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover {
            background: #b51515;
        }
        .auth-links {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .auth-links a {
            color: #007bff;
            text-decoration: none;
        }
        .social-login {
            margin-top: 20px;
            text-align: center;
        }
        .social-login p {
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }
        .btn-social {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
        }
        .btn-google {
            border: 1px solid #ea4335;
            color: #ea4335;
        }
        .btn-google:hover {
            background: #ea4335;
            color: white;
        }
        .btn-facebook {
            border: 1px solid #1877f2;
            color: #1877f2;
        }
        .btn-facebook:hover {
            background: #1877f2;
            color: white;
        }
        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert-error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }
        .alert-success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
    </style>
</head>
<body>



    <header class="cyber-header" style="background-color: #cd1818; color: white; padding: 10px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 99999;">
        <div class="container" style="max-width: 1200px; margin: 0 auto; display: flex; align-items: center; padding: 0 15px;">
            <a th:href="@{/}" class="cyber-logo" style="text-decoration: none; display: flex; align-items: center;">
                <img th:src="@{/images/logo.png}" alt="Cyber World Logo" style="height: 50px; margin-right: 15px;">
                <div class="cyber-logo-text" style="display: flex; flex-direction: column; justify-content: center;">
                    <span class="cyber-logo-title" style="font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 1px; line-height: 1.1; text-transform: uppercase; color: white;">CYBER</span>
                    <span class="cyber-logo-title" style="font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 1px; line-height: 1.1; text-transform: uppercase; color: white;">WORLD</span>
                </div>
            </a>
        </div>
    </header>
    
    <main class="main-container">
        <div class="auth-container">
            <h2>Login</h2>
            
            <div th:if="${param.error}" class="alert alert-error">
                Invalid email or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Logout successful.
            </div>

            <form method="post" th:action="@{/login}">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="username" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <div class="social-login">
                <p>Or login with</p>
                <a href="/oauth2/authorization/google" class="btn-social btn-google">
                    <i class="fab fa-google"></i> Login with Google
                </a>
                <a href="/oauth2/authorization/facebook" class="btn-social btn-facebook">
                    <i class="fab fa-facebook-f"></i> Login with Facebook
                </a>
            </div>

            <div class="auth-links">
                <p>Don't have an account? <a href="/register">Register now!</a></p>
            </div>
        </div>
    </main>

    <div th:replace="~{thymeleaf/client/layout/footer :: footer}"></div>
</body>
</html>
